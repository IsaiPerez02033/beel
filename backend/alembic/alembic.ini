[alembic]
script_location = alembic
prepend_sys_path = .

# La URL se sobreescribe desde env.py usando settings.DATABASE_URL
# Este valor es solo un placeholder para el modo offline
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/beel

# Formato de los archivos de migración generados
file_template = %%(rev)s_%%(slug)s

# Timezone para los timestamps en los archivos de migración
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
